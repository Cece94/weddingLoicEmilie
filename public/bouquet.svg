<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 560" role="img" aria-label="Watercolor style floral bouquet">
  <defs>
    <linearGradient id="petalPeach" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8d4bf"/>
      <stop offset="100%" stop-color="#e7a47e"/>
    </linearGradient>
    <linearGradient id="petalRust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9825f"/>
      <stop offset="100%" stop-color="#8f3b2f"/>
    </linearGradient>
    <linearGradient id="petalCoral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0b29d"/>
      <stop offset="100%" stop-color="#c86b57"/>
    </linearGradient>
    <linearGradient id="leafSage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8c3ab"/>
      <stop offset="100%" stop-color="#6d7963"/>
    </linearGradient>
    <linearGradient id="twig" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9d7f6d"/>
      <stop offset="100%" stop-color="#7c6354"/>
    </linearGradient>
    <radialGradient id="coreDark" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#633027"/>
      <stop offset="100%" stop-color="#2f1612"/>
    </radialGradient>
    <radialGradient id="berry" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#d59b75"/>
      <stop offset="100%" stop-color="#a56641"/>
    </radialGradient>
    <filter id="watercolor" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="9" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8"/>
    </filter>
  </defs>

